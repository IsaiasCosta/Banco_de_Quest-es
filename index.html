<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Meu Caderno de Questões</title>

    <link rel="stylesheet" href="./css/style.css">

</head>

<body>

    <!-- =========================
         CABEÇALHO
    ========================== -->

    <header class="cabecalho">

        <h1>📚 Meu Caderno de Questões</h1>

        <div class="abas">

            <button class="aba ativa" id="btn-questoes">
                ❓ Questões
            </button>

            <button class="aba" id="btn-estudos">
                📖 Estudos
            </button>

        </div>

    </header>



    <!-- =========================
         PÁGINA QUESTÕES
    ========================== -->

    <main id="pagina-questoes" class="pagina">

        <!-- Painel -->

        <section class="painel-filtros">

            <h2>🎯 Revisão por Questões</h2>

            <div class="campo">

                <label>Concurso</label>

                <select id="select-concurso-q">
                    <option value="">Selecione...</option>
                </select>

            </div>

            <div class="campo">

                <label>Matéria</label>

                <select id="select-materia-q">
                    <option value="">Selecione...</option>
                </select>

            </div>

            <button
                class="btn-filtrar"
                onclick="iniciarQuestoes()">

                🚀 Iniciar Revisão

            </button>

        </section>



        <!-- Dashboard -->

        <section class="dashboard">

            <div class="placar-item">

                Questões

                <span id="total-respondidas">0</span>

                /

                <span id="total-filtradas">0</span>

            </div>

            <div class="placar-item acertos">

                Acertos

                <span id="total-acertos">0</span>

                (

                <span id="pct-acertos">0%</span>

                )

            </div>

            <div class="placar-item erros">

                Erros

                <span id="total-erros">0</span>

            </div>

        </section>



        <!-- Caderno -->

        <div class="caderno">

            <div class="topo-caderno">

                <span class="tag-concurso" id="tag-concurso">
                    Concurso
                </span>

                <span class="tag-materia" id="tag-materia">
                    Matéria
                </span>

            </div>

            <h2 id="enunciado" class="enunciado">

                Selecione um concurso e uma matéria.

            </h2>

            <div id="opcoes" class="opcoes"></div>

            <div
                id="area-feedback"
                class="feedback-oculto">

                <div id="status-resposta"></div>

                <div class="explicacao">

                    <strong>Gabarito Comentado</strong>

                    <p id="texto-explicacao"></p>

                </div>

            </div>

            <div class="botoes-navegacao">

                <button onclick="questaoAnterior()">

                    ← Anterior

                </button>

                <button onclick="proximaQuestao()">

                    Próxima →

                </button>

            </div>

        </div>

    </main>



    <!-- =========================
         PÁGINA ESTUDOS
    ========================== -->

    <main
        id="pagina-estudos"
        class="pagina oculto">

        <!-- Painel -->

        <section class="painel-filtros">

            <h2>📖 Material de Estudo</h2>

            <div class="campo">

                <label>Concurso</label>

                <select id="select-concurso-e">

                    <option value="">Selecione...</option>

                </select>

            </div>

            <div class="campo">

                <label>Texto</label>

                <select id="select-texto">

                    <option value="">Selecione...</option>

                </select>

            </div>

            <button
                class="btn-filtrar"
                onclick="iniciarEstudos()">

                📚 Abrir Material

            </button>

        </section>



        <!-- Conteúdo -->

        <div class="material-estudo">

            <h2 id="titulo-estudo">

                Área de Estudos

            </h2>

            <div id="conteudo-estudo">

                Escolha um texto para iniciar.

            </div>

            <button
                class="btn-filtrar"
                onclick="resolverQuestoesTexto()">

                Resolver questões deste texto

            </button>

        </div>

    </main>



    <script src="js/estado.js"></script>
    <script src="js/util.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/filtros.js"></script>
    <script src="js/questoes.js"></script>
    <script src="js/estudos.js"></script>
    <script src="js/script.js"></script>

</body>

</html>
